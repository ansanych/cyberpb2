syntax = "proto3";
import "cyber.proto";

package cybertele;

option go_package = "./proto";

service Cybermetrica {
    //v1
    rpc Health (Empty) returns (HealthReply) {}
    rpc StartParser (Empty) returns (ParserStatus) {}
    rpc StopParser (Empty) returns (ParserStatus) {}
    rpc MachineStatisticPeriod (MachineStatisticRequest) returns (StatisticPeriod) {}
    //v2
    rpc GetTelemetryParams (Empty) returns (TelemertyParams) {}
    rpc CreateTelemetryParam (TelemertyParam) returns (StatusReply) {}
    rpc UpdateTelemetryParam (TelemertyParam) returns (StatusReply) {}
    rpc GetTimeline (TimelineRequest) returns (Timeline) {}
}

//v1
message MachineStatisticRequest {
    string sn = 1;
    int32 timezone = 2;
    string date = 3;
    string from = 4;
    string to = 5;
    string graph = 6;
    float code = 7;
    string period = 8;
}

message StatisticEngine {
    int64 all = 1;
    int64 idle = 2;
    int64 work = 3;
    int64 highRPM = 4;
}

message StatisticFuel {
    int32 consumption = 1;
    int32 drainVolume = 2;
    int32 drainCount = 3;
    int32 refillVolume = 4;
    int32 refillCount = 5;
}

message StatisticPeriodItem {
    string label = 1;
    float workhours = 2;
    StatisticEngine engine = 3;
    StatisticFuel fuel = 4;
    int64 job = 5;
    int64 connection = 6;
    int32 errorsCount = 7;
}

message StatisticPeriod {
    string sn = 1;
    int32 timezone = 2;
    string from = 3;
    string to = 4;
    string period = 5;
    string step = 6;
    repeated StatisticPeriodItem data = 7;
    float workhoursStart = 8;
    float workhoursEnd = 9;
    StatisticFuel fuel = 10;
    int32 errorsCount = 11;
    int64 connection = 12;
}

//v2

message TelemertyParams {
    repeated TelemertyParam params = 1;
}

message TelemertyParam {
    string code = 1;
    string label = 2;
    string units = 3;
    string description = 4;
}

message TimelineRequest {
    int64 date = 1;
    int32 tz = 2;
    string sn = 3;
    bool prev = 4;
    bool next = 5; 
}

message DataValuesRow {
    repeated float values = 1;
}

message TelemetryBlock {
    int64 start = 1;
    int64 end = 2;
    float value = 3;
}

message TelemetryConnection {
    int64 id = 1;
    int64 start = 2;
    int64 end = 3;
    bool finished = 4;
    repeated TelemetryBlock engine = 5;
    repeated TelemetryBlock job = 6;
    repeated TelemetryBlock errors = 7;
    repeated string params = 8;
    repeated DataValuesRow dataValues = 9;
}

message Timeline {
    repeated TelemetryConnection data = 1;
    repeated TelemetryConnection prev = 2;
    repeated TelemetryConnection next = 3;
}

