syntax = "proto3";
import "cyber.proto";

package cybertele;

option go_package = "./proto";

service Cybermetrica {
    rpc Health (Empty) returns (HealthReply) {}
    rpc StartParser (Empty) returns (ParserStatus) {}
    rpc StopParser (Empty) returns (ParserStatus) {}
    rpc MachineStatisticPeriod (MachineStatisticRequest) returns (StatisticPeriod) {}
    rpc GetTelemetryParams (Empty) returns (TelemertyParams) {}
    rpc CreateTelemetryParam (TelemertyParam) returns (StatusReply) {}
    rpc UpdateTelemetryParam (TelemertyParam) returns (StatusReply) {}
    rpc GetTimeline (TimelineRequest) returns (Timeline) {}
    rpc GetEvents (TimelineRequest) returns (Events) {}
}

message MachineStatisticRequest {
    string sn = 1;
    int32 timezone = 2;
    string date = 3;
    string from = 4;
    string to = 5;
    string graph = 6;
    float code = 7;
    string period = 8;
}

message StatisticEngine {
    int64 all = 1;
    int64 idle = 2;
    int64 work = 3;
    int64 highRPM = 4;
}

message StatisticFuel {
    int32 consumption = 1;
    int32 drainVolume = 2;
    int32 drainCount = 3;
    int32 refillVolume = 4;
    int32 refillCount = 5;
}

message StatisticPeriodItem {
    string label = 1;
    float workhours = 2;
    StatisticEngine engine = 3;
    StatisticFuel fuel = 4;
    int64 job = 5;
    int64 connection = 6;
    int32 errorsCount = 7;
}

message StatisticPeriod {
    string sn = 1;
    int32 timezone = 2;
    string from = 3;
    string to = 4;
    string period = 5;
    string step = 6;
    repeated StatisticPeriodItem data = 7;
    float workhoursStart = 8;
    float workhoursEnd = 9;
    StatisticFuel fuel = 10;
    int32 errorsCount = 11;
    int64 connection = 12;
}

message TelemertyParams {
    repeated TelemertyParam params = 1;
}

message TelemertyParam {
    string code = 1;
    string label = 2;
    string units = 3;
    string description = 4;
}

message TimelineRequest {
    string sn = 1;
    string date = 2;
    int32 tz = 3;
}

message DataValuesRow {
    repeated float values = 1;
}

message ConnectionDataBlock {
    int64 id = 1;
    bool finished = 2;
    repeated DataValuesRow dataValues = 3;
}

message EventBlock {
    int64 start = 1;
    int64 end = 2;
    float value = 3;
    int64 id = 4;
}

message Timeline {
    string sn = 1;
    string date = 2;
    int32 tz = 3;
    int64 startTimeUnix = 4;
    repeated string params = 5;
    repeated EventBlock connections = 6;
    repeated EventBlock engines = 7;
    repeated EventBlock jobs = 8;
    repeated EventBlock errors = 9;
    repeated ConnectionDataBlock data = 10;
}

message Events {
    repeated Event events = 1;
}

message Event {
    int64 id = 1;
    string startTime = 2;
    string endTime = 3;
    Status status = 4;
    float code = 5;
    string message = 6;
    string description = 7;
}