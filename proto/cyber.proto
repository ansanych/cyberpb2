syntax = "proto3";
package cybertele;
option go_package = "./proto";

// Status — статус компонента системы.
// При сериализации в JSON используется строковое представление (UNKNOWN, ACTIVE, INACTIVE, OK, ERROR, WARNING).
// Для корректной JSON-сериализации используйте protojson с UseEnumNumbers=false
// или кастомный MarshalJSON из пакета proto.
enum Status {
    // UNKNOWN — статус не определён
    UNKNOWN = 0;
    // ACTIVE — компонент активен
    ACTIVE = 1;
    // INACTIVE — компонент неактивен
    INACTIVE = 2;
    // OK — компонент работает нормально
    OK = 3;
    // ERROR — ошибка компонента
    ERROR = 4;
    // WARNING — предупреждение
    WARNING = 5;
}

message Empty {}

message StatusReply {
    Status status = 1; 
}

message Disk {
    float all = 1;
    float used = 2;
    float free = 3;
}

message HealthReply {
    Status postgres = 1;
    Status mongo = 2;
    Status parser = 3;
    Disk disk = 4;
}

message ParserStatus {
    Status parser = 1;
    string message = 2;
}

message PageRequest {
    int32 page = 1;
    int32 limit = 2;
    string sn = 3;
}

message Pagination {
    int32 page = 1;
    int32 limit = 2;
    int32 total = 3;
}

message Machine {
    string sn = 1;
    string model = 2;
    bool sync = 3;
    int32 generationId = 4;
    int32 classId = 5;
    string className = 6;
    string generationName = 7;
    int32 modelId = 8;
}

message Machines {
    repeated Machine machines = 1;
}

message DataType {
    string code = 1;
    string name = 2;
    string meaning = 3;
    bool required = 4;
    string group = 5;
}

message DataTypes {
    repeated DataType data = 1;
}

message ModelDataTypes {
    string model = 1;
    repeated DataType dataTypes = 2;
    int32 modelId = 3;
}

message AllModelsDataTypes {
    repeated ModelDataTypes data = 1;
}

message DataPoint {
    int64 time = 1;
    float valueFloat = 2;
    int64 valueInt = 3;
}

message DataPoints {
    repeated DataPoint data = 1;
}

message Segment {
    int64 startTime = 1;
    int64 endTime = 2;
    int64 durationSec = 3;
    float change = 4;
    float startValue = 5;
    float endValue = 6;
    string trend = 7;
}

message Segments {
    repeated Segment segments = 1;
}